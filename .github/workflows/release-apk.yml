name: Release Corporate Tax Manager APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgmp-dev libmpfr-dev libmpc-dev \
            autoconf automake libtool pkg-config \
            ccache zlib1g-dev libltdl-dev

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer cython

      - name: Build APK
        run: buildozer android debug

      - name: Prepare release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          cat > release_notes.md <<EOF
          # Corporate Tax Manager ${TAG}

          APK debug build for Android (arm64-v8a).

          ## Highlights
          - Dual-surface Flask web + Kivy Android
          - User-customizable calendar (recurring + one-time)
          - PPh 21 payroll log with auto-calc
          - Period report with print preview + CSV export
          - Neutral eye-friendly UI tokens

          ## Install
          1. Download the APK artifact from this release
          2. Enable install from unknown sources if needed
          3. Open the APK on device

          Built from commit: ${GITHUB_SHA}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
